name: Plio CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
        with:
          # keep the aged hook pins on a python they support
          python-version: "3.10"
      # run pre-commit directly instead of the archived pre-commit/action,
      # whose bundled cache client hard-fails the job whenever the GitHub
      # cache service has an outage (same fix as plio-backend)
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Install Dependencies
        run: npm install

      - name: Run Test Cases
        env:
          VUE_APP_FRONTEND: ${{ secrets.VUE_APP_FRONTEND }}
        # command to run tests and generate coverage metrics
        run: npm run test:unit

      # In-repo coverage gate: compares the measured total line % against the
      # committed floor (coverage-floor.json) and fails the job on erosion.
      # Runs before the Codecov upload so the gate holds even if Codecov is
      # unreachable, and writes measured-vs-floor to the job summary.
      - name: Enforce coverage floor
        id: coverage-floor
        run: node scripts/checkCoverageFloor.js

      - name: Upload coverage to Codecov
        # upload even when the floor gate fails -- a regressing commit is
        # exactly when the per-file report is needed. files + disable_search
        # keep v5's auto-discovery from slurping coverage-floor.json as a
        # coverage input and skewing the frontend-unit flag.
        if: success() || steps.coverage-floor.outcome == 'failure'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          disable_search: true
          flags: frontend-unit
          fail_ci_if_error: true
