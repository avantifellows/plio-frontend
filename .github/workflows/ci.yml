name: Plio CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
      - uses: pre-commit/action@v2.0.0

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Install Dependencies
        run: npm install

      - name: Run Test Cases
        env:
          VUE_APP_FRONTEND: ${{ secrets.VUE_APP_FRONTEND }}
        # command to run tests and generate coverage metrics
        run: npm run test:unit

      # In-repo coverage gate: compares the measured total line % against the
      # committed floor (coverage-floor.json) and fails the job on erosion.
      # Runs before the Codecov upload so the gate holds even if Codecov is
      # unreachable, and writes measured-vs-floor to the job summary.
      - name: Enforce coverage floor
        run: node scripts/checkCoverageFloor.js

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: frontend-unit
          fail_ci_if_error: true
