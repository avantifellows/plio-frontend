name: Playwright E2E

on:
  pull_request:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    uses: ./.github/workflows/e2e.yml
    with:
      trigger_role: frontend
      # github.sha is the PR merge commit on pull_request events (so we
      # test what would actually land) and the branch head on
      # schedule/dispatch runs
      trigger_ref: ${{ github.sha }}
      branch_name: ${{ github.head_ref || github.ref_name }}
      quarantine_blocking: ${{ github.event_name != 'pull_request' }}
    secrets:
      GOOGLE_OAUTH2_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH2_CLIENT_ID }}
      GOOGLE_OAUTH2_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH2_CLIENT_SECRET }}
      GOOGLE_OAUTH2_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH2_REFRESH_TOKEN }}
